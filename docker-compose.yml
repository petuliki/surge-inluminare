version: '3.9'

services:
  surge-inluminare:
    build: .
    image: surge-inluminare:local
    ports:
      - "8000:8000"   # vLLM
      - "8001:8001"   # TTS
      - "8002:8002"   # STT
      - "8888:8888"   # API + Frontend
      - "8889:8889"   # JupyterLab
    volumes:
      - ./workspace_template:/workspace
    environment:
      - WORKSPACE_DIR=/workspace
      - VLLM_MODEL=mlabonne/Qwen3-14B-abliterated
      - VLLM_QUANTIZATION=awq_marlin
      - VLLM_GPU_MEMORY_UTILIZATION=0.50
      - VLLM_MAX_MODEL_LEN=4096
      - STT_MODEL=large-v3-turbo
      - STT_LANGUAGE=de
      - TTS_MODEL_DIR=/workspace/models/cosyvoice
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    restart: unless-stopped
